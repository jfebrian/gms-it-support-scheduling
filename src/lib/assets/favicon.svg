<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
	<title>GMS IT Support</title>
	<!--
		Favicon matches the GMS brand blue (#00408c) with a white "GMS" wordmark
		at the same tracking as the sidebar header. Kept minimal so it reads at
		16px in a browser tab.
	-->
	<rect width="64" height="64" rx="10" fill="#00408c"/>
	<text
		x="32"
		y="42"
		text-anchor="middle"
		font-family="'Gotham', 'Helvetica Neue', Arial, sans-serif"
		font-size="24"
		font-weight="800"
		letter-spacing="2"
		fill="#ffffff">GMS</text>
</svg>
